version: "3.9"

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    environment:
      TZ: 'America/New_York'
      FTLCONF_webserver_api_password: 'TheBoss123?com'
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_dns_upstreams: '172.30.0.3#5335'
    volumes:
      - './etc-pihole:/etc/pihole'
      - './etc-dnsmasq.d:/etc/dnsmasq.d'
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8000:80/tcp"
      - "4430:443/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    restart: unless-stopped
    networks:
      pihole_net:
        ipv4_address: 172.30.0.2

  unbound:
    container_name: unbound
    image: mvance/unbound:latest
    volumes:
      - './unbound:/etc/unbound'
    restart: unless-stopped
    networks:
      pihole_net:
        ipv4_address: 172.30.0.3

networks:
  pihole_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/16
